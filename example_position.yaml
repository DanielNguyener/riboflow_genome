##########################################################################
#####   Local / laptop example — bundled refs + chrM mini STAR index   #####
##########################################################################
#
# Assumes cwd is this repo (`riboflow_genome`) when you invoke Nextflow.
#
# Prerequisites:
#   1. Bowtie2 rRNA filter (ships in-repo):
#      references_for_riboflow/filter/human/v1/human_rtRNA*.bt2
#   2. Mini STAR index (YOU build once from GENCODE FASTA/GTF — NOT committed):
#
#      references_for_riboflow/genome/scripts/build_star_mini_index.sh
#      → writes  references_for_riboflow/genome/STAR_index_chrM/
#
# The mini index is mitochondrial DNA only (~16 kb). Nuclear ribo-seq / RNA-seq
# reads will mostly align as unmapped vs GRCh38; this file is meant for plumbing
# / smoke tests locally, not biological interpretation.
#
# Run:
#   nextflow run RiboFlow.groovy -params-file example_local.yaml \
#       -c configs/local.config
#
##########################################################################

do_fastqc: false
do_check_file_existence: true

# ── Alignment path selection ──────────────────────────────────────────────────
# genome.run (default true) and transcriptome.run (default false) are independent.
genome:
  run: true
  mapping_quality_cutoff: 255   # STAR: 255=unique only; <255=include multi-mappers
  ribo_filter_flags: 2308       # 2308 = unmapped(4) + secondary(256) + supplementary(2048)

# ── Bowtie2 transcriptome alignment + ribopy .ribo ────────────────────────────
# Set run: true to enable the parallel transcriptome branch (bowtie2 → dedup →
# ribopy create → .ribo). Independent of dedup_method (shared with genome path).
transcriptome:
  run: true

# ribopy create tuning parameters.
ribo:
  ref_name: appris_human_24_01_2019
  metagene_radius: 50
  left_span: 35
  right_span: 15
  read_length:
    min: 15
    max: 35
  coverage: true

# ── Deduplication ─────────────────────────────────────────────────────────────
# "position"    : coordinate-based dedup (RFC dedup). Use when reads have NO UMIs.
# "umicollapse" : UMI-aware dedup. Use when reads carry a UMI barcode.
# "none"        : skip deduplication entirely.
dedup_method: "position"

# Only relevant when dedup_method is "umicollapse".
# Leave empty ("") if you are not using UMIs.
#
# Example for a 12-nt UMI + 4-nt spacer at read start:
#   umi_tools_extract_arguments: "-p \"^(?P<umi_1>.{12})(?P<discard_1>.{4}).+$\" --extract-method=regex"
umi_tools_extract_arguments: ""

# Extra flags forwarded to umicollapse (core flags are set in RiboFlow.groovy).
umicollapse_arguments: ""

# ── Pipeline modules ──────────────────────────────────────────────────────────
do_rnaseq: true          # set false to run ribo-seq only
do_strand_split: true   # set true to emit stranded BAMs in output/alignments/ribo/stranded/

# ── Adapter trimming ──────────────────────────────────────────────────────────
# Standard TruSeq / Illumina small-RNA adapter, keeping 15–40 nt fragments:
clip_arguments: '-u 1 -a CTGTAGGCACCATCAAT --overlap=4 --trimmed-only --maximum-length=40 --minimum-length=15 --quality-cutoff=28'

##########################################################################
# Alignment
##########################################################################

alignment_arguments:
   filter: '-L 15 --no-unal --norc'
   genome: ''   # unused in STAR path; kept for schema compatibility

# STAR flags (I/O, thread, and output-format flags are set in RiboFlow.groovy).
star:
   # Set true to emit a transcriptome-coordinate BAM alongside the genome BAM.
   output_transcriptome_bam: false

   # Ribo-seq: end-to-end, short-read tuned
   ribo_arguments: '--alignEndsType EndToEnd --seedSearchStartLmax 15 --outFilterType Normal --outFilterMultimapNmax 20 --alignSJDBoverhangMin 1 --outFilterMismatchNoverReadLmax 0.04 --winAnchorMultimapNmax 150 --twopassMode Basic'

   # RNA-seq: ENCODE PE flags; multimappers retained here, unique-only enforced downstream
   rnaseq_arguments: '--outFilterType BySJout --outFilterMultimapNmax 20 --alignSJoverhangMin 8 --alignSJDBoverhangMin 1 --outFilterMismatchNmax 999 --outFilterMismatchNoverReadLmax 0.04 --alignIntronMin 20 --alignIntronMax 1000000 --alignMatesGapMax 1000000 --sjdbScore 1 --limitBAMsortRAM 85899345920'

##########################################################################
# Output folder names
##########################################################################

# Final user-facing artifacts land under output/:
#   output/alignments/{ribo,rnaseq}/{individual,merged}/   -> dedup BAM + BED
#   output/bigwigs/{ribo,rnaseq}/                          -> bigWigs
#   output/stats/                                          -> stats.csv, individual_stats.csv
#   output/rnaseq/stats/                                   -> RNA-seq stats CSVs
#   output/fastqc/                                         -> FastQC reports (if do_fastqc: true)
# Intermediate work files live under intermediates/.
output:
   individual_lane_directory: 'individual'
   merged_lane_directory: 'merged'
   intermediates:
      base: 'test_position_intermediates'
      clip: 'clip'
      log: 'log'
      transcriptome_alignment: 'transcriptome_alignment'
      filter: 'filter'
      genome_alignment: 'genome_alignment'
      bam_to_bed: 'bam_to_bed'
      quality_filter: 'quality_filter'
      alignment_ribo: 'alignment_ribo'
   output:
      base: 'test_position_output'
      log: 'log'
      fastqc: 'fastqc'
      stats: 'stats'
      bigwigs: 'bigwigs'
      alignments: 'alignments'

##########################################################################
# Input — reference files and ribo-seq FASTQs
##########################################################################

input:
   reference:
      # Bowtie2 index prefix for rRNA / contaminant filtering (glob OK).
      # Ships under references_for_riboflow/filter/ in this checkout.
      filter: ./rf_sample_data_genome/filter/human_rtRNA*

      # STAR genome DIRECTORY from build_star_mini_index.sh (default OUTDIR).
      # Must contain: SA, SAindex, Genome, chrNameLength.txt
      genome: ./rf_sample_data_genome/genome
      #
      # If you built another contig (`MINI_SEQ=chr22` etc.), match OUTDIR /
      # `STAR_index_<MINI_SEQ>` from the script defaults.

      # Bowtie2 transcriptome index prefix (glob OK). Required when transcriptome.run: true.
      transcriptome: ./rf_sample_data_genome/transcriptome/appris_human_24_01_2019_selected*
      # Annotation BED defining UTR5/CDS/UTR3 regions per transcript.
      regions: ./rf_sample_data_genome/annotation/appris_human_24_01_2019_actual_regions.bed
      # Tab-separated transcript name → length file.
      transcript_lengths: ./rf_sample_data_genome/annotation/appris_human_24_01_2019_selected.lengths.tsv

   # Optional common prefix prepended to every FASTQ path below.
   # Set to "" to use absolute paths.
   fastq_base: ""

   fastq:
      # Each key is a sample name; each list item is one sequencing lane.
      #
      # Single-end lane  →  a plain string
      # Paired-end lane  →  a two-element list [R1, R2]
      #
      # Single-end example (two lanes):
      GSM1606107:
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606107/SRR1795425.fastq.gz
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606107/SRR1795426.fastq.gz
      GSM1606108:
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606108/SRR1795427.fastq.gz
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606108/SRR1795428.fastq.gz

      # Paired-end example (one lane):
      # sample_B:
      #   - [lane1/sample_B_R1.fastq.gz, lane1/sample_B_R2.fastq.gz]

##########################################################################
# RNA-seq Configuration
##########################################################################
#
# Key settings:
# - dedup_method: "position" (recommended) or "none"
# - fastq_base: can differ from the ribo-seq fastq_base above
#
# RNA-seq bigWigs are written to: output/bigwigs/rnaseq/

rnaseq:
   clip_arguments: '-u 1 --quality-cutoff=28 --minimum-length=20'

   # Common prefix for RNA-seq FASTQs (set "" to use absolute paths)
   fastq_base: ""
   # "position" or "none"
   dedup_method: "position"

   # Minimum MAPQ for the RNA-seq quality-pass filter.
   # 4 enforces unique-mapper output (STAR multimapper MAPQ < 4).
   mapping_quality_cutoff: 4

   # SAM FLAG mask for the RNA-seq quality-pass filter (samtools view -F).
   # 2308 = 4 (unmapped) + 256 (secondary) + 2048 (supplementary).
   # Unlike ribo-seq, secondary alignments are dropped here to keep unique mappers only.
   filter_flags: 2308

   filter_arguments: '-L 15 --no-unal'

   fastq:
      # Sample names must match the ribo-seq sample names above.
      #
      # Single-end lane:
      #   sample_A:
      #     - rnaseq/sample_A.fastq.gz
      #
      # Paired-end lane (the two files must be true R1/R2 mates with matching
      # read IDs — e.g. produced by `fastq-dump --split-files SRRxxxxxxx`,
      # which yields SRRxxxxxxx_1.fastq.gz and SRRxxxxxxx_2.fastq.gz):
      #   sample_B:
      #     - [rnaseq/sample_B_1.fastq.gz, rnaseq/sample_B_2.fastq.gz]
      #
      # The lanes below are two single-end SRA runs per sample (each SRR is its
      # own lane). They are NOT paired mates of each other — they're separate
      # sequencing runs of the same biological sample, so they belong as two
      # entries in the list.
      GSM1606107:
        - ./rf_sample_data_genome/fastq/rnaseq/GSM1606099/SRR1795409.fastq.gz
        - ./rf_sample_data_genome/fastq/rnaseq/GSM1606099/SRR1795410.fastq.gz
      GSM1606108:
        - ./rf_sample_data_genome/fastq/rnaseq/GSM1606100/SRR1795411.fastq.gz
        - ./rf_sample_data_genome/fastq/rnaseq/GSM1606100/SRR1795412.fastq.gz
##########################################################################
#####        RiboFlow Genome — Example / Template Configuration       ####
##########################################################################
#
# Copy this file, fill in your paths and sample names, then run:
#   nextflow run RiboFlow.groovy -params-file your_config.yaml \
#       -c configs/local.config
#
##########################################################################

do_fastqc: false
do_check_file_existence: true

# ── Deduplication ─────────────────────────────────────────────────────────────
# "position"    : coordinate-based dedup (RFC dedup). Use when reads have NO UMIs.
# "umicollapse" : UMI-aware dedup. Use when reads carry a UMI barcode.
# "none"        : skip deduplication entirely.
dedup_method: "position"

# Only relevant when dedup_method is "umicollapse".
# Leave empty ("") if you are not using UMIs.
#
# Example for a 12-nt UMI + 4-nt spacer at read start:
#   umi_tools_extract_arguments: "-p \"^(?P<umi_1>.{12})(?P<discard_1>.{4}).+$\" --extract-method=regex"
umi_tools_extract_arguments: ""

# Extra flags forwarded to umicollapse (core flags are set in RiboFlow.groovy).
umicollapse_arguments: ""

# ── Pipeline modules ──────────────────────────────────────────────────────────
do_rnaseq: true          # set false to run ribo-seq only

# Minimum MAPQ for the ribo-seq quality-pass filter (0 = keep all primary alignments,
# including multimappers — these contribute to every locus in the bigwig).
mapping_quality_cutoff: 0

# SAM FLAG mask for the ribo-seq quality-pass filter (samtools view -F).
# 2052 = 4 (unmapped) + 2048 (supplementary). Secondary (256) is KEPT so that
# multi-mapper alignments are retained. Change only if your library requires
# unique-only ribo reads (use 2308 = 4+256+2048 in that case).
ribo_filter_flags: 2052

# ── Adapter trimming ──────────────────────────────────────────────────────────
# Standard TruSeq / Illumina small-RNA adapter, keeping 15–40 nt fragments:
clip_arguments: '-a AGATCGGAAGAGCACACGTCT --overlap=10 --trimmed-only --maximum-length=40 --minimum-length=15 --quality-cutoff=20'

##########################################################################
# Alignment
##########################################################################

alignment_arguments:
   filter: '-L 15 --no-unal --norc'
   genome: ''   # unused in STAR path; kept for schema compatibility

# STAR flags (I/O, thread, and output-format flags are set in RiboFlow.groovy).
star:
   # Set true to emit a transcriptome-coordinate BAM alongside the genome BAM.
   output_transcriptome_bam: false

   # Ribo-seq: end-to-end, short-read tuned
   ribo_arguments: '--alignEndsType EndToEnd --seedSearchStartLmax 15 --outFilterType Normal --outFilterMultimapNmax 20 --alignSJDBoverhangMin 1 --outFilterMismatchNoverReadLmax 0.04 --winAnchorMultimapNmax 150 --twopassMode Basic'

   # RNA-seq: ENCODE PE flags; multimappers retained here, unique-only enforced downstream
   rnaseq_arguments: '--outFilterType BySJout --outFilterMultimapNmax 20 --alignSJoverhangMin 8 --alignSJDBoverhangMin 1 --outFilterMismatchNmax 999 --outFilterMismatchNoverReadLmax 0.04 --alignIntronMin 20 --alignIntronMax 1000000 --alignMatesGapMax 1000000 --sjdbScore 1 --limitBAMsortRAM 85899345920'

##########################################################################
# Output folder names
##########################################################################

# Final user-facing artifacts land under output/:
#   output/alignments/{ribo,rnaseq}/{individual,merged}/   -> dedup BAM + BED
#   output/bigwigs/{ribo,rnaseq}/                          -> bigWigs
#   output/stats/                                          -> stats.csv, individual_stats.csv
#   output/rnaseq/stats/                                   -> RNA-seq stats CSVs
#   output/fastqc/                                         -> FastQC reports (if do_fastqc: true)
# Intermediate work files live under intermediates/.
output:
   individual_lane_directory: 'individual'
   merged_lane_directory: 'merged'
   intermediates:
      base: 'intermediates'
      clip: 'clip'
      log: 'log'
      transcriptome_alignment: 'transcriptome_alignment'
      filter: 'filter'
      genome_alignment: 'genome_alignment'
      bam_to_bed: 'bam_to_bed'
      quality_filter: 'quality_filter'
      alignment_ribo: 'alignment_ribo'
   output:
      base: 'output'
      log: 'log'
      fastqc: 'fastqc'
      stats: 'stats'
      bigwigs: 'bigwigs'
      alignments: 'alignments'

##########################################################################
# Input — reference files and ribo-seq FASTQs
##########################################################################

input:
   reference:
      # Bowtie2 index prefix for rRNA / contaminant filtering (glob OK)
      filter: /path/to/references/filter/human_rtRNA*

      # STAR genome index DIRECTORY (no glob).
      # Must contain: SA, SAindex, Genome, chrNameLength.txt
      genome: /path/to/STAR_index/

   # Optional common prefix prepended to every FASTQ path below.
   # Set to "" to use absolute paths.
   fastq_base: "/path/to/fastq/root/"

   fastq:
      # Each key is a sample name; each list item is one sequencing lane.
      #
      # Single-end lane  →  a plain string
      # Paired-end lane  →  a two-element list [R1, R2]
      #
      # Single-end example (two lanes):
      sample_A:
        - lane1/sample_A.fastq.gz
        - lane2/sample_A.fastq.gz

      # Paired-end example (one lane):
      # sample_B:
      #   - [lane1/sample_B_R1.fastq.gz, lane1/sample_B_R2.fastq.gz]

##########################################################################
# RNA-seq Configuration
##########################################################################
#
# Key settings:
# - dedup_method: "position" (recommended) or "none"
# - fastq_base: can differ from the ribo-seq fastq_base above
#
# RNA-seq bigWigs are written to: output/bigwigs/rnaseq/

rnaseq:
   clip_arguments: '-u 1 --quality-cutoff=28 --minimum-length=20'

   # Common prefix for RNA-seq FASTQs (set "" to use absolute paths)
   fastq_base: "/path/to/rnaseq/fastq/root/"

   # "position" or "none"
   dedup_method: "none"

   # Minimum MAPQ for the RNA-seq quality-pass filter.
   # 4 enforces unique-mapper output (STAR multimapper MAPQ < 4).
   mapping_quality_cutoff: 4

   # SAM FLAG mask for the RNA-seq quality-pass filter (samtools view -F).
   # 2308 = 4 (unmapped) + 256 (secondary) + 2048 (supplementary).
   # Unlike ribo-seq, secondary alignments are dropped here to keep unique mappers only.
   filter_flags: 2308

   filter_arguments: '-L 15 --no-unal'

   fastq:
      # Sample names must match the ribo-seq sample names above.
      #
      # Single-end lane:
      # sample_A:
      #   - rnaseq/sample_A.fastq.gz
      #
      # Paired-end lane (most RNA-seq data):
      sample_A:
        - [rnaseq/sample_A_R1.fastq.gz, rnaseq/sample_A_R2.fastq.gz]

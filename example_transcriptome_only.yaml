##########################################################################
#####  Transcriptome-only example — umicollapse dedup, human v2/v3 refs  #####
#####  genome.run: false  →  bowtie2 transcriptome → .ribo (no STAR)     #####
##########################################################################
#
# Transcriptome-only path: reads are filtered, then aligned to the bowtie2
# transcriptome index → ribopy .ribo. STAR genome alignment is DISABLED
# (genome.run: false), so no STAR genome index is required or checked.
# RNA-seq is enabled but, with the genome path off, only the RNA-seq
# transcriptome path runs (do_rna_genome = do_rnaseq && genome.run).
#
#   Filter:        references_for_riboflow/filter/human/v2
#   Transcriptome: references_for_riboflow/transcriptome/human/v3
#   RNA-seq FASTQs: rf_sample_data_genome/fastq/rnaseq/GSM1606099+100 (SE, mapped to 1cell IDs)
#
# Samples: 1cell-2 and 1cell-4 carry a 12-nt UMI + 4-nt spacer at read start (ribo-seq).
# RNA-seq uses position dedup (no UMIs in RNA-seq; umicollapse reserved for ribo-seq path).
# RNA-seq sample IDs match ribo-seq IDs so RIBOPY_RNASEQ_SET can join them.
#
# Prerequisites (NO STAR genome index needed — genome.run is false):
#   1. Filter index (ships in-repo):
#      references_for_riboflow/filter/human/v2/human_rtRNA*.bt2
#   2. Transcriptome index (ships in-repo):
#      references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_selected*.bt2
#
# Run:
#   nextflow run main.nf -profile local -params-file example_transcriptome_only.yaml
#
##########################################################################

do_fastqc: false
do_check_file_existence: true

# ── Pipeline modules ──────────────────────────────────────────────────────────
do_rnaseq: true
do_strand_split: false   # operates on genome alignments → no-op while genome.run: false
do_bigwig: false         # strand-specific bigWig coverage tracks (deepTools); genome-only, off here

# ── Adapter trimming (ribo-seq) ───────────────────────────────────────────────
# 1cell libraries: longer reads (UMI+spacer overhead), no 5' trim needed.
clip_arguments: '-a AAAAAAAAAACAAAAAAAAAA --overlap=4 --trimmed-only --maximum-length=56 --minimum-length=31 --quality-cutoff=28'
# 12-nt UMI + 4-nt spacer at read start.
umi_tools_extract_arguments: "-p \"^(?P<umi_1>.{12})(?P<discard_1>.{4}).+$\" --extract-method=regex"
umicollapse_arguments: ""
dedup_method: "umicollapse"

# ── Alignment ─────────────────────────────────────────────────────────────────
alignment_arguments:
   filter: '-L 15 --no-unal --norc'        # bowtie2 filter flags
   transcriptome: '-L 15 --no-unal --norc' # bowtie2 transcriptome flags (active — this is the alignment path)
   # note: alignment_arguments.genome is unused — genome alignment is STAR, configured via star.ribo_arguments

# ── STAR ──────────────────────────────────────────────────────────────────────
# Entire block is INACTIVE while genome.run: false (no STAR alignment runs).
# Kept present for parity with the genome examples; populate before flipping genome.run: true.
star:
   output_transcriptome_bam: false
   ribo_arguments: '--alignEndsType EndToEnd --seedSearchStartLmax 15 --outFilterType Normal --outFilterMultimapNmax 20 --alignSJDBoverhangMin 1 --outFilterMismatchNoverReadLmax 0.04 --winAnchorMultimapNmax 150 --twopassMode Basic'
   # RNA-seq: ENCODE flags; multimappers retained here, unique-only enforced downstream.
   rnaseq_arguments: '--outFilterType BySJout --outFilterMultimapNmax 20 --alignSJoverhangMin 8 --alignSJDBoverhangMin 1 --outFilterMismatchNmax 999 --outFilterMismatchNoverReadLmax 0.04 --alignIntronMin 20 --alignIntronMax 1000000 --alignMatesGapMax 1000000'
   #
   # ── Index-generation settings (only used when genome_fasta + gtf are set below) ──
   # Uncomment and set these when using build-from-FASTA mode:
   #   sjdb_overhang: 28        # read_length - 1; adjust to your library's read length
   #   index_dir: /path/to/cache  # recommended: built index is reused across runs (avoids rebuild on resume)
   #   index_args: ''           # extra genomeGenerate flags; set '--genomeSAindexNbases 7' for very small genomes only

# ── Alignment path selection ──────────────────────────────────────────────────
# genome.run (default true) and transcriptome.run (default false) are independent.
# Here genome is OFF and transcriptome is ON → transcriptome-only run.
genome:
  run: false
  mapping_quality_cutoff: 255   # unique mappers only (unused while run: false) — STAR: 255=unique; <255=multi-mappers
  ribo_filter_flags: 2308     # unused while run: false — 2308 = unmapped(4) + secondary(256) + supplementary(2048)

# ── Bowtie2 transcriptome → ribopy .ribo (the active alignment path) ──────────
transcriptome:
  run: true
  mapping_quality_cutoff: 10   # bowtie2: 10=confident; 20=more strict; 40=unique only

ribo:
  ref_name: appris_human_v3
  metagene_radius: 50
  left_span: 35
  right_span: 15
  read_length:
    min: 15
    max: 35
  coverage: true

  # ── Metadata embedded into .ribo files ───────────────────────────────────
  # ribometa attaches experiment-wide metadata (e.g. the run config itself) to
  # every .ribo file. metadata.files attaches a different YAML per sample —
  # useful for cell line, treatment condition, batch info, etc.
  # Retrieve after a run with: ribopy meta info <sample>.ribo
  ribometa: ./example_transcriptome_only.yaml   # embed this params file as the experiment record

  metadata:
    base: ./meta                        # path prefix applied to all files below
    files:
      1cell-2: 1cell-2.yaml            # untreated K562 — see meta/1cell-2.yaml
      1cell-4: 1cell-4.yaml            # harringtonine washout — see meta/1cell-4.yaml

# ── RNA-seq path ──────────────────────────────────────────────────────────────
# SE. Sample IDs must match ribo-seq (1cell-2, 1cell-4) so RIBOPY_RNASEQ_SET joins correctly.
# Using GSM1606099/100 FASTQs as stand-in (no 1cell RNA-seq in sample set).
# RNA-seq dedup_method: position — umicollapse reserved for ribo-seq only.
# NOTE: rnaseq.genome.* is unused here — RNA-seq genome alignment is gated on genome.run.
rnaseq:
  fastq_base: ""
  clip_arguments: '-u 1 --quality-cutoff=28 --minimum-length=20'
  filter_arguments: '-L 15 --no-unal'
  dedup_method: "position"          # position | none | umicollapse (SE only)
  umi_tools_extract_arguments: ""
  genome:
    mapping_quality_cutoff: 255     # unique mappers only (unused while genome.run: false) — STAR: 255=unique
    filter_flags: 2308              # unused while genome.run: false — unmapped(4) + secondary(256) + supplementary(2048)
  transcriptome:
    mapping_quality_cutoff: 10
    alignment_arguments: '-L 15 --no-unal'
  fastq:
    1cell-2:
      - ./rf_sample_data_genome/fastq/rnaseq/GSM1606099/SRR1795409.fastq.gz
      - ./rf_sample_data_genome/fastq/rnaseq/GSM1606099/SRR1795410.fastq.gz
    1cell-4:
      - ./rf_sample_data_genome/fastq/rnaseq/GSM1606100/SRR1795411.fastq.gz
      - ./rf_sample_data_genome/fastq/rnaseq/GSM1606100/SRR1795412.fastq.gz

# ── Output directories ────────────────────────────────────────────────────────
output:
   individual_lane_directory: 'individual'
   merged_lane_directory: 'merged'
   intermediates:
      base: 'transcriptome_only_intermediates'
      clip: 'clip'
      log: 'log'
      transcriptome_alignment: 'transcriptome_alignment'
      filter: 'filter'
      genome_alignment: 'genome_alignment'      # unused (genome.run: false); kept for block parity
      bam_to_bed: 'bam_to_bed'
      quality_filter: 'quality_filter'
      alignment_ribo: 'alignment_ribo'
   output:
      base: 'transcriptome_only_output'
      log: 'log'
      fastqc: 'fastqc'
      stats: 'stats'
      bigwigs: 'bigwigs'
      alignments: 'alignments'
      ribo: 'ribo'

# ── Input — references and FASTQs (ribo-seq) ──────────────────────────────────
input:
   reference:
      filter: ./references_for_riboflow/filter/human/v2/human_rtRNA*

      # ── STAR genome index — NOT used here (genome.run: false) ─────────────────
      # No genome index is required or existence-checked while genome is off.
      # To re-enable genome alignment, set genome.run: true above and provide ONE mode:
      #   MODE A — pre-built index:  genome: ./rf_sample_data_genome/genome
      #   MODE B — build from FASTA: genome_fasta + gtf (and uncomment star.sjdb_overhang)
      # genome: ./rf_sample_data_genome/genome
      # genome_fasta: /path/to/GRCh38.primary_assembly.genome.fa
      # gtf:          /path/to/gencode.v48.annotation.gtf

      transcriptome: ./references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_selected*
      regions: ./references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_actual_regions.bed
      transcript_lengths: ./references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_transcript_lengths.tsv

   fastq_base: ""

   fastq:
      1cell-2:
        - ./rf_sample_data_genome/fastq/ribosome_profiling/1cell-2/1cell-2.fastq.gz
      1cell-4:
        - ./rf_sample_data_genome/fastq/ribosome_profiling/1cell-4/1cell-4.fastq.gz

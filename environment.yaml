name: ribo_genome
channels:
  - conda-forge
  - bioconda
dependencies:
  # Nextflow >=24.10 runs the DSL2 pipeline and requires Java 17+. That same
  # JDK also satisfies umicollapse (>=17), so one runtime serves the whole
  # pipeline — no more separate Java 8 (DSL1) + Java 11 (umicollapse) split.
  - nextflow>=24.10.0
  - openjdk>=17
  # umicollapse is now packaged on bioconda (CLI entrypoint `umicollapse`),
  # replacing the hand-shipped umicollapse.jar + `java11` wrapper. It pulls in
  # its own openjdk>=17. The dedup step calls `umicollapse bam ...` directly.
  - umicollapse>=1.1.0
  - python>=3.11
  - samtools>=1.21
  - fastqc>=0.12.1
  - setuptools
  - pip
  - matplotlib>=3.8
  - bowtie2>=2.5.4
  - star>=2.7.11b
  - bx-python>=0.13
  - pysam>=0.22
  - bedtools>=2.31.1
  - cutadapt>=4.9
  - deeptools>=3.5.5
  - ucsc-bedgraphtobigwig
  - pip:
    - numpy<2
    - pandas
    - scipy
    - umi-tools>=1.1.5
    # The two git deps below track upstream `main` / default branch. For a
    # reproducible release, pin each to a specific commit:
    #     git+https://github.com/<repo>.git@<commit-sha>
    - git+https://github.com/ribosomeprofiling/ribopy.git
    - git+https://github.com/DanielNguyener/RFCommands_genome.git

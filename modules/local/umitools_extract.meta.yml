name: UMITOOLS_EXTRACT
description: Extract UMIs with umi_tools (umicollapse path only). Ports extract_umi_via_umi_tools (:280).
keywords: [umi, umi_tools, dedup]
input:
  - meta: { type: map }
  - fastq: { type: file, description: Clipped FASTQ }
output:
  - reads: { description: "[meta, *.umi_extracted.fastq.gz]" }
  - log:   { description: "[meta, *.umi_extracted.log]" }
ext:
  - args: umi_tools extract flags (default params.umi_tools_extract_arguments)

name: SAMTOOLS_QPASS
description: Quality-pass filter (MAPQ + FLAG) + counts. ext.presort coord-sorts first (transcriptome BAM). Ports genome_quality_filter (:576) / transcriptome_sort_and_filter (:675).
keywords: [samtools, filter, mapq]
input:
  - meta: { type: map }
  - bam:  { type: file }
output:
  - bam:    { description: "[meta, *.qpass.bam, *.qpass.bam.bai]" }
  - counts: { description: "[meta, total, primary, secondary]" }
ext:
  - prefix, presort

name: SPLIT_STRANDED_BAM
description: Split the final BAM into +/- strand BAM/BED (gated on do_strand_split). Ports genome_split_stranded_bam (:1432).
keywords: [samtools, strand, split]
input:
  - meta: { type: map }
  - bam:  { type: file }
  - bai:  { type: file }
output:
  - stranded: { description: "[meta, plus.bam+bai, minus.bam+bai, plus.bed, minus.bed]" }

##########################################################################
#####  chrM build-index test — exercises STAR_INDEX genomeGenerate    #####
##########################################################################
#
# Purpose: validate the build-from-FASTA pipeline path locally on macOS.
# Uses a chrM-only FASTA + GTF so genomeGenerate finishes in seconds.
#
# Prerequisites (one-time — run from repo root before invoking Nextflow):
#
#   gzip -dc index_input/GRCh38.primary_assembly.genome.fa.gz \
#     | awk '/^>chrM/{p=1} /^>/{if(!/^>chrM/)p=0} p' \
#     > index_input/chrM.fa
#
#   gzip -dc index_input/gencode.v48.primary_assembly.basic.annotation.gtf.gz \
#     | awk '/^#/ || /^chrM/' \
#     > index_input/chrM.gtf
#
# macOS note: STAR genomeGenerate (index build) runs fine on macOS.
# STAR alignReads will fail on macOS due to the zcat issue — use Docker for
# the full pipeline, or -stub-run to verify wiring without STAR.
#
# Run (macOS — index build only; alignment will fail at zcat):
#   nextflow run main.nf -profile local -params-file example_chrM_build_index.yaml
#
# Verify index was built:
#   ls index_input/chrM_star_index/star_index/   # SA, SAindex, Genome, chrNameLength.txt
#
# Second run (storeDir cache hit — STAR_INDEX skipped):
#   nextflow run main.nf -profile local -params-file example_chrM_build_index.yaml -resume
#
# Full end-to-end run (Docker — alignment works):
#   docker run --rm -it -v $(pwd):/workspace -w /workspace \
#     danielnguyener/riboflow:0.0.2 /bin/bash
#   # inside: nextflow run main.nf -profile local -params-file example_chrM_build_index.yaml
#
##########################################################################

do_fastqc: false
do_check_file_existence: true

# ── Pipeline modules ──────────────────────────────────────────────────────────
do_rnaseq: false
do_strand_split: false

# ── Adapter trimming (ribo-seq) ───────────────────────────────────────────────
clip_arguments: '-u 1 -a CTGTAGGCACCATCAAT --overlap=4 --trimmed-only --maximum-length=40 --minimum-length=15 --quality-cutoff=28'
dedup_method: "position"
umi_tools_extract_arguments: ""
umicollapse_arguments: ""

# ── Alignment ─────────────────────────────────────────────────────────────────
alignment_arguments:
   filter: '-L 15 --no-unal --norc'       # bowtie2 filter flags (active)
   # transcriptome: '-L 15 --no-unal --norc'  # bowtie2 transcriptome flags (active when transcriptome.run: true)

star:
   output_transcriptome_bam: false
   ribo_arguments: '--alignEndsType EndToEnd --seedSearchStartLmax 15 --outFilterType Normal --outFilterMultimapNmax 20 --alignSJDBoverhangMin 1 --outFilterMismatchNoverReadLmax 0.04 --winAnchorMultimapNmax 150 --twopassMode Basic'
   rnaseq_arguments: '--outFilterType BySJout --outFilterMultimapNmax 20 --alignSJoverhangMin 8 --alignSJDBoverhangMin 1 --outFilterMismatchNmax 999 --outFilterMismatchNoverReadLmax 0.04 --alignIntronMin 20 --alignIntronMax 1000000 --alignMatesGapMax 1000000'

   # ── Index-generation settings (MODE B — build-from-FASTA) ───────────────────
   # These are only used because genome_fasta + gtf are set below (Mode B).
   # In Mode A (pre-built index via 'genome:'), these three lines are ignored and can be omitted.
   sjdb_overhang: 28                        # read_length - 1; must match your library's read length
   index_args: '--genomeSAindexNbases 7'    # required for very small genomes only (chrM = 16 kb); omit for full genomes
   index_dir: ./index_input/chrM_star_index # persistent cache: built index is reused on -resume / second runs

# ── Alignment path selection ──────────────────────────────────────────────────
genome:
  run: true
  mapping_quality_cutoff: 255   # unique-only
  ribo_filter_flags: 2308       # unmapped(4) + secondary(256) + supplementary(2048)

# ── No transcriptome path (genome-only test) ──────────────────────────────────
transcriptome:
  run: false
#   mapping_quality_cutoff: 10   # bowtie2: 10=confident; 20=more strict; 40=unique only

# ribo:
#   ref_name: appris_human_v3
#   metagene_radius: 50
#   left_span: 35
#   right_span: 15
#   read_length:
#     min: 15
#     max: 35
#   coverage: true
# ── Input — chrM FASTA+GTF (triggers STAR_INDEX), reuse existing ribo-seq FASTQs ──
input:
   reference:
      filter: ./references_for_riboflow/filter/human/v2/human_rtRNA*

      # ── STAR genome index — MODE B (build from FASTA+GTF) ────────────────────
      # 'genome' is absent here — presence of genome_fasta triggers index generation.
      # To switch to MODE A (pre-built index): remove genome_fasta + gtf, add:
      #   genome: /path/to/existing/index_dir
      genome_fasta: ./index_input/chrM.fa
      gtf:          ./index_input/chrM.gtf

      # transcriptome refs not needed (transcriptome.run: false)
      # transcriptome: ./references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_selected*
      # regions: ./references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_actual_regions.bed
      # transcript_lengths: ./references_for_riboflow/transcriptome/human/v3/riboflow_annot_and_ref/appris_human_v3_transcript_lengths.tsv

   fastq_base: ""

   fastq:
      GSM1606107:
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606107/SRR1795425.fastq.gz
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606107/SRR1795426.fastq.gz
      GSM1606108:
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606108/SRR1795427.fastq.gz
        - ./rf_sample_data_genome/fastq/ribosome_profiling/GSM1606108/SRR1795428.fastq.gz

